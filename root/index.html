<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SYNVI">
<title>SYNVI·SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #0d1b2a;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  .screen {
    width: 100%; height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d1b2a;
  }
  .screen.active { display: flex; }

  /* START */
  #screen-start { gap: 36px; }
  .logo-icon {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: #0e4d6e;
    border: 1.5px solid #1a7fa8;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 42px; height: 42px; }
  .app-name { color: #a8d8ea; font-size: 13px; letter-spacing: 3px; font-weight: 500; }
  .app-title { color: #e8f4f8; font-size: 20px; font-weight: 500; text-align: center; line-height: 1.4; }
  .btn-start {
    width: 130px; height: 130px;
    border-radius: 50%;
    border: 2px solid #1a9db8;
    background: #0a3a4a;
    color: #4dd9f0;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    outline: none;
    -webkit-appearance: none;
  }
  .btn-start::before { content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid #1a9db830; }
  .btn-start::after  { content:''; position:absolute; inset:-20px; border-radius:50%; border:1px solid #1a9db818; }
  .btn-start:active { transform: scale(0.96); }
  .hint { color: #3a6a7e; font-size: 11px; letter-spacing: 1.5px; }

  /* LOADING */
  #screen-loading { gap: 28px; }
  .scanning-label { color: #a8d8ea; font-size: 11px; letter-spacing: 3px; }
  .spinner-wrap { position: relative; width: 150px; height: 150px; }
  .spinner-wrap canvas { position: absolute; top: 0; left: 0; }
  .spinner-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .spinner-pct { color: #4dd9f0; font-size: 30px; font-weight: 500; }
  .spinner-sub { color: #5a8a9e; font-size: 11px; letter-spacing: 2px; }
  .load-bar-wrap { width: 180px; height: 3px; background: #1a3347; border-radius: 2px; }
  .load-bar { height: 3px; background: #1a9db8; border-radius: 2px; width: 0%; transition: width 0.4s linear; }
  .load-step { color: #5a8a9e; font-size: 12px; text-align: center; padding: 0 32px; min-height: 16px; }

  /* RESULTS */
  #screen-results { justify-content: flex-start; overflow-y: auto; padding-bottom: 24px; }
  .res-header {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 52px 20px 12px;
    border-bottom: 0.5px solid #1a3347;
  }
  .res-header-left { display: flex; align-items: center; gap: 10px; }
  .res-dot { width: 7px; height: 7px; background: #4dd9f0; border-radius: 50%; }
  .res-title-label { color: #a8d8ea; font-size: 12px; letter-spacing: 2px; }
  .res-time { color: #3a6a7e; font-size: 11px; }
  .gauge-section { width:100%; display:flex; flex-direction:column; align-items:center; padding:16px 20px 8px; gap:6px; }
  .section-label { color: #5a8a9e; font-size: 10px; letter-spacing: 2px; }
  .gauge-wrap { position: relative; width: 180px; height: 100px; }
  .gauge-wrap canvas { position: absolute; top: 0; left: 0; }
  .gauge-center { position: absolute; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; }
  .gauge-pct { font-size: 32px; font-weight: 500; line-height: 1; color: #4dd9f0; }
  .gauge-risk { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; margin-top: 2px; color: #4dd9f0; }
  .strat-section { width: 100%; padding: 6px 20px 12px; }
  .strat-bar { height: 10px; border-radius: 5px; background: linear-gradient(to right, #2db36e, #f5c842, #e07b30, #d63031); }
  .strat-marker-wrap { position: relative; height: 12px; }
  .strat-marker { position: absolute; top: 0; width: 3px; height: 12px; background: white; border-radius: 2px; transform: translateX(-50%); }
  .divider { height: 0.5px; background: #1a3347; margin: 0 20px; width: calc(100% - 40px); }
  .metrics-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px 20px; }
  .metric-card { background:#0f2233; border-radius:12px; border:0.5px solid #1a3347; padding:14px; display:flex; flex-direction:column; gap:6px; }
  .metric-name { color: #5a8a9e; font-size: 10px; letter-spacing: 1.5px; }
  .metric-val { font-size: 22px; font-weight: 500; }
  .metric-tag { font-size:10px; font-weight:500; letter-spacing:0.5px; padding:3px 8px; border-radius:5px; display:inline-block; }
  .scan-icons { display:flex; gap:10px; padding:8px 20px 12px; justify-content:center; }
  .scan-icon { width:58px; height:58px; border-radius:10px; background:#0f2233; border:0.5px solid #1a3347; display:flex; align-items:center; justify-content:center; }
  .scan-icon svg { width:36px; height:36px; opacity:0.7; }
  .btn-rescan {
    margin: 4px 20px 0;
    background: #0a3a4a; border: 1px solid #1a9db8; border-radius: 10px;
    color: #4dd9f0; font-size: 13px; letter-spacing: 1.5px; padding: 14px;
    cursor: pointer; width: calc(100% - 40px); outline: none; -webkit-appearance: none;
  }
  .btn-rescan:active { transform: scale(0.98); }
</style>
</head>
<body>

<div id="screen-start" class="screen active">
  <div class="logo-icon">
    <svg viewBox="0 0 42 42" fill="none">
      <path d="M21 5 L21 37 M5 21 L37 21" stroke="#4dd9f0" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="14" stroke="#1a9db8" stroke-width="1.5" fill="none"/>
      <circle cx="21" cy="21" r="6" fill="#4dd9f0" opacity="0.25"/>
      <path d="M10 15 Q15 21 10 27" stroke="#4dd9f0" stroke-width="1.2" fill="none"/>
      <path d="M32 15 Q27 21 32 27" stroke="#4dd9f0" stroke-width="1.2" fill="none"/>
    </svg>
  </div>
  <div class="app-name">SYNVI·SYSTEM</div>
  <div class="app-title">Bioimpedance<br>Analysis</div>
  <button class="btn-start" onclick="startScan()">START</button>
  <div class="hint">PLACE DEVICE ON JOINT</div>
</div>

<div id="screen-loading" class="screen">
  <div class="scanning-label">SCANNING</div>
  <div class="spinner-wrap">
    <canvas id="spinnerCanvas" width="150" height="150"></canvas>
    <div class="spinner-center">
      <div class="spinner-pct" id="loadPct">0%</div>
      <div class="spinner-sub">ANALYZING</div>
    </div>
  </div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-step" id="loadStep">Initializing sensor...</div>
</div>

<div id="screen-results" class="screen">
  <div class="res-header">
    <div class="res-header-left">
      <div class="res-dot"></div>
      <div class="res-title-label">SYNVI·SYSTEM</div>
    </div>
    <div class="res-time" id="resTime">--:--</div>
  </div>
  <div class="gauge-section">
    <div class="section-label">INFLAMMATION PROBABILITY</div>
    <div class="gauge-wrap">
      <canvas id="gaugeCanvas" width="180" height="100"></canvas>
      <div class="gauge-center">
        <div class="gauge-pct">23%</div>
        <div class="gauge-risk">LOW RISK</div>
      </div>
    </div>
  </div>
  <div class="strat-section">
    <div class="section-label" style="margin-bottom:6px;">RISK STRATIFICATION</div>
    <div class="strat-bar"></div>
    <div class="strat-marker-wrap"><div class="strat-marker" style="left:23%;"></div></div>
  </div>
  <div class="divider"></div>
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-name">INFECTION</div>
      <div class="metric-val" style="color:#4dd9f0;">12%</div>
      <div class="metric-tag" style="background:#0a2e3a;color:#4dd9f0;">NONE DETECTED</div>
    </div>
    <div class="metric-card">
      <div class="metric-name">INFLAMMATION</div>
      <div class="metric-val" style="color:#4dd9f0;">23%</div>
      <div class="metric-tag" style="background:#0a2e3a;color:#4dd9f0;">LOW</div>
    </div>
    <div class="metric-card">
      <div class="metric-name">IMPEDANCE</div>
      <div class="metric-val" style="color:#e8f4f8;">847 Ω</div>
      <div class="metric-tag" style="background:#0f2a1a;color:#2db36e;">NORMAL</div>
    </div>
    <div class="metric-card">
      <div class="metric-name">FLUID LEVEL</div>
      <div class="metric-val" style="color:#e8f4f8;">↑ 8%</div>
      <div class="metric-tag" style="background:#2a1e0a;color:#f5c842;">MILD EDEMA</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="scan-icons">
    <div class="scan-icon"><svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="13" r="7" stroke="#4dd9f0" stroke-width="1.5"/><path d="M11 20 Q11 29 18 29 Q25 29 25 20" stroke="#4dd9f0" stroke-width="1.5" fill="none"/><line x1="18" y1="6" x2="18" y2="30" stroke="#1a9db8" stroke-width="0.5" stroke-dasharray="2,2"/></svg></div>
    <div class="scan-icon"><svg viewBox="0 0 36 36" fill="none"><path d="M13 8 L13 28 M23 8 L23 28" stroke="#4dd9f0" stroke-width="1.5" stroke-linecap="round"/><path d="M8 18 Q18 11 28 18" stroke="#1a9db8" stroke-width="1" fill="none"/><circle cx="18" cy="18" r="3.5" fill="#4dd9f0" opacity="0.35"/></svg></div>
    <div class="scan-icon"><svg viewBox="0 0 36 36" fill="none"><path d="M11 27 L18 9 L25 27" stroke="#4dd9f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 21 L23 21" stroke="#1a9db8" stroke-width="1"/><circle cx="18" cy="29" r="2" fill="#4dd9f0" opacity="0.5"/></svg></div>
    <div class="scan-icon"><svg viewBox="0 0 36 36" fill="none"><path d="M9 13 Q9 7 18 7 Q27 7 27 13 L27 23 Q27 29 18 29 Q9 29 9 23 Z" stroke="#4dd9f0" stroke-width="1.5" fill="none"/><line x1="9" y1="18" x2="27" y2="18" stroke="#1a9db8" stroke-width="0.5" stroke-dasharray="2,2"/><circle cx="18" cy="18" r="2.5" fill="#4dd9f0" opacity="0.4"/></svg></div>
  </div>
  <button class="btn-rescan" onclick="resetApp()">↺  NEW SCAN</button>
</div>

<script>
const steps = [
  "Initializing sensor...","Emitting bioimpedance signal...",
  "Calibrating electrode contact...","Measuring tissue resistance...",
  "Analyzing fluid composition...","Detecting inflammatory markers...",
  "Cross-referencing baseline data...","Computing infection probability...",
  "Finalizing risk stratification...","Generating report..."
];

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function drawSpinner(pct) {
  var c = document.getElementById('spinnerCanvas');
  var ctx = c.getContext('2d');
  var cx=75, cy=75, r=58;
  ctx.clearRect(0,0,150,150);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='#1a3347'; ctx.lineWidth=8; ctx.stroke();
  var end=(pct/100)*Math.PI*2-Math.PI/2;
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,end); ctx.strokeStyle='#1a9db8'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r-14,0,Math.PI*2); ctx.strokeStyle='#0e4d6e'; ctx.lineWidth=2; ctx.stroke();
}

function drawGauge(pct) {
  var c = document.getElementById('gaugeCanvas');
  var ctx = c.getContext('2d');
  var cx=90, cy=92, r=70;
  ctx.clearRect(0,0,180,100);
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,0); ctx.strokeStyle='#1a3347'; ctx.lineWidth=12; ctx.stroke();
  var end=Math.PI+(pct/100)*Math.PI;
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,end); ctx.strokeStyle='#1a9db8'; ctx.lineWidth=12; ctx.lineCap='round'; ctx.stroke();
}

function startScan() {
  show('screen-loading');
  var pct=0, stepIdx=0;
  drawSpinner(0);
  var DURATION_MS = 40000;
  var iv = setInterval(function() {
    pct++;
    document.getElementById('loadPct').textContent = pct+'%';
    document.getElementById('loadBar').style.width = pct+'%';
    var si = Math.min(Math.floor((pct/100)*steps.length), steps.length-1);
    if(si!==stepIdx){ stepIdx=si; document.getElementById('loadStep').textContent=steps[stepIdx]; }
    drawSpinner(pct);
    if(pct>=100){ clearInterval(iv); showResults(); }
  }, DURATION_MS/100);
}

function showResults() {
  show('screen-results');
  var now=new Date();
  document.getElementById('resTime').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  drawGauge(23);
}

function resetApp() { show('screen-start'); }
</script>
</body>
</html>
